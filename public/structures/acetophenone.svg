<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <!-- Acetophenone structure - handwritten style -->
  <style>
    .structure { stroke: #1e3a8a; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .bond-double { stroke-dasharray: 5, 5; }
    .carbon { fill: #1e3a8a; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
    .oxygen { fill: #dc2626; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
  </style>
  
  <!-- Benzene ring -->
  <g transform="translate(80, 110)">
    <!-- Outer ring -->
    <path class="structure" d="
      M 0,-50
      L 43.3,-25
      L 43.3,25
      L 0,50
      L -43.3,25
      L -43.3,-25
      Z
    "/>
    
    <!-- Inner double bond circle -->
    <circle class="structure bond-double" cx="0" cy="0" r="30" stroke-width="2"/>
  </g>
  
  <!-- Acetyl group (COCH3) attached to benzene -->
  <g transform="translate(123.3, 110)">
    <!-- C=O bond (carbonyl) -->
    <line class="structure" x1="0" y1="0" x2="30" y2="0"/>
    <line class="structure" x1="30" y1="0" x2="30" y2="5" stroke-width="3"/>
    
    <!-- C-CH3 bond -->
    <line class="structure" x1="30" y1="0" x2="55" y2="0"/>
    
    <!-- Labels -->
    <text class="carbon" x="28" y="-8" text-anchor="middle">O</text>
    <text class="carbon" x="60" y="5" text-anchor="start">CHƒ</text>
  </g>
  
  <!-- Label -->
  <text x="110" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#1e3a8a">
    Acetophenone
  </text>
</svg>
