<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Benzene ring - handwritten style -->
  <style>
    .structure { stroke: #1e3a8a; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .bond-double { stroke-dasharray: 5, 5; }
  </style>
  
  <!-- Hexagon shape for benzene -->
  <g transform="translate(100, 100)">
    <!-- Outer ring -->
    <path class="structure" d="
      M 0,-50
      L 43.3,-25
      L 43.3,25
      L 0,50
      L -43.3,25
      L -43.3,-25
      Z
    "/>
    
    <!-- Inner double bond circle -->
    <circle class="structure bond-double" cx="0" cy="0" r="30" stroke-width="2"/>
  </g>
  
  <!-- Label -->
  <text x="100" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#1e3a8a">
    Benzene
  </text>
</svg>
