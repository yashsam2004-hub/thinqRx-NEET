<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Mock Tests - PharmCards Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #2d3748;
            margin-bottom: 12px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #718096;
            margin-bottom: 32px;
            font-size: 16px;
        }
        
        .info-box {
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            padding: 16px;
            margin-bottom: 24px;
            border-radius: 4px;
        }
        
        .info-box p {
            color: #2c5282;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .info-box p:last-child {
            margin-bottom: 0;
        }
        
        button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #c6f6d5;
            border: 1px solid #68d391;
            color: #22543d;
            display: block;
        }
        
        .result.error {
            background: #fed7d7;
            border: 1px solid #fc8181;
            color: #742a2a;
            display: block;
        }
        
        .result h3 {
            margin-bottom: 8px;
            font-size: 18px;
        }
        
        .result p {
            line-height: 1.5;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .tests-list {
            margin-top: 12px;
            padding-left: 20px;
        }
        
        .tests-list li {
            margin-bottom: 6px;
            color: #22543d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Seed Mock Tests</h1>
        <p class="subtitle">Initialize sample GPAT practice tests</p>
        
        <div class="info-box">
            <p><strong>This will create 15 sample mock tests:</strong></p>
            <p>• GPAT Mock Test 2026 - Tests 1 through 15</p>
            <p style="margin-top: 12px;">Each test contains 5 questions covering different pharmacy subjects.</p>
            <p><strong>Perfect for Pro users!</strong> Pro plan gets unlimited access to all 15 tests.</p>
        </div>
        
        <button id="seedBtn" onclick="seedMockTests()">
            Seed Mock Tests
        </button>
        
        <div id="result" class="result"></div>
    </div>
    
    <script>
        async function seedMockTests() {
            const btn = document.getElementById('seedBtn');
            const result = document.getElementById('result');
            
            // Reset result
            result.className = 'result';
            result.style.display = 'none';
            
            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Seeding tests...';
            
            try {
                const response = await fetch('/api/admin/seed-mock-tests', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    result.className = 'result success';
                    result.innerHTML = `
                        <h3>✅ Success!</h3>
                        <p>${data.message}</p>
                        ${data.tests ? `
                            <ul class="tests-list">
                                ${data.tests.map(t => `<li>${t.title}</li>`).join('')}
                            </ul>
                        ` : ''}
                        <p style="margin-top: 12px;"><strong>Next step:</strong> Go to <a href="/dashboard" style="color: #2c5282; text-decoration: underline;">Dashboard</a> or <a href="/mock-tests" style="color: #2c5282; text-decoration: underline;">Mock Tests</a> to see them!</p>
                    `;
                    btn.innerHTML = '✓ Tests Seeded Successfully';
                } else {
                    throw new Error(data.error || 'Failed to seed mock tests');
                }
                
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = `
                    <h3>❌ Error</h3>
                    <p>${error.message}</p>
                    <p style="margin-top: 8px;">Please make sure:</p>
                    <ul style="margin-left: 20px; margin-top: 8px;">
                        <li>You are logged in as an admin</li>
                        <li>The server is running (npm run dev)</li>
                        <li>Database connection is working</li>
                    </ul>
                `;
                btn.disabled = false;
                btn.innerHTML = 'Retry Seeding';
            }
        }
    </script>
</body>
</html>
